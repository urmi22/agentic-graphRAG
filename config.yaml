llm:
  primary_model: gemini/gemini-2.5-flash
  fallback_model: groq/llama-3.3-70b-versatile
  temperature: 0.0

embedding:
  model: BAAI/bge-small-en-v1.5

retrieval:
  top_k: 5

graph:
  k_hops: 2

agent:
  max_retries: 2

eval:
  sample_per_type: 4    # comparison + bridge questions drawn at random, on top of the 3 anchor cases
  seed: 13
  judge_sleep_s: 4.0     # throttle between judge-LLM calls to stay under free-tier RPM/TPM

dataset:
  name: hotpotqa/hotpot_qa
  subset: distractor
  split: validation
  n_questions: 500
